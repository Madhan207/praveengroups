# Render.com Free Deployment Blueprint for Django Backend
services:
  - type: web
    name: praveenelectro-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,praveengroups.in,www.praveengroups.in,localhost,127.0.0.1"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,https://praveengroups.in,https://www.praveengroups.in"
