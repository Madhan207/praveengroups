# Nginx Configuration File for praveengroups.in on Hostinger VPS
# Save as: /etc/nginx/sites-available/praveengroups

server {
    listen 80;
    server_name praveengroups.in www.praveengroups.in;

    # Maximum file upload size (for product/banner image uploads & payment proofs)
    client_max_body_size 25M;

    # 1. Serve React Frontend (dist static files)
    location / {
        root /var/www/praveenelectro_world/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy API requests to Django Backend (Gunicorn socket)
    location /api/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/praveenelectro_world/backend/gunicorn.sock;
    }

    # 3. Proxy Django Admin Panel requests
    location /admin/ {
        include proxy_params;
        proxy_pass http://unix:/var/www/praveenelectro_world/backend/gunicorn.sock;
    }

    # 4. Serve Django Static Files (collectstatic output)
    location /static/ {
        alias /var/www/praveenelectro_world/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 5. Serve Uploaded Media Files (Images, Attachments, Screenshots)
    location /media/ {
        alias /var/www/praveenelectro_world/backend/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
